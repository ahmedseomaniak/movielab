query TrendingMovies {
    trendingMovies {
        tmdbId
        title
        overview
        posterUrl
        voteAverage
        genres
    }
}

query SearchMovies($query: String!, $page: Int) {
    searchMovies(query: $query, page: $page) {
        items {
            tmdbId
            title
            overview
        }
        pageInfo {
            currentPage
            totalPages
        }
    }
}
