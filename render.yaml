services:
  - type: web
    name: movielab-api
    env: java
    region: frankfurt
    buildCommand: cd server && ./mvnw clean package -DskipTests
    startCommand: java -jar server/target/*.jar
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: PGHOST
        fromService:
          type: pserv
          name: movielab-db
          property: host
      - key: PGPORT
        fromService:
          type: pserv
          name: movielab-db
          property: port
      - key: PGDATABASE
        value: movielab
      - key: PGUSER
        value: movielab
      - key: PGPASSWORD
        sync: false

  - type: web
    name: movielab
    env: static
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        value: https://movielab-api.onrender.com/graphql

  - type: pserv
    name: movielab-db
    plan: free
    env: postgres
    region: frankfurt
