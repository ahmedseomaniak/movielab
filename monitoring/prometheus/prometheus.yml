global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'movielab-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'movielab-api'

  - job_name: 'movielab-api-production'
    metrics_path: '/actuator/prometheus'
    scheme: https
    static_configs:
      - targets: ['movielab-api.onrender.com']
        labels:
          application: 'movielab-api'
          env: 'production'
    basic_auth:
      username: 'admin'
      password: 'admin'
    scrape_interval: 60s
